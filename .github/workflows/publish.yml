name: Publish

on:
  release:
    types: [ published ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: |
          PRE_TAG=$(node -p "require('./package.json').version.split('-')[1]?.split('.')[0] ?? ''")
          if [ -n "$PRE_TAG" ]; then
            npm publish --provenance --tag "$PRE_TAG"
          else
            npm publish --provenance
          fi
